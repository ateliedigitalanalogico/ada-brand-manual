<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    body {
      background: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      height: 100vh;
      margin: 0;
    }

    .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    label {
      font-family: monospace;
      font-size: 11px;
      color: rgba(255,255,255,.4);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    p {
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      font-size: 36px;
      color: white;
      letter-spacing: 0;
      margin: 0;
    }

    .local { }
    .gfont { }
  </style>
  <style>
    @font-face {
      font-family: 'DM Mono Local';
      font-weight: 400;
      src: url('/fonts/DMMono_w400.woff2') format('woff2');
    }
    .local { font-family: 'DM Mono Local', monospace; }
  </style>
</head>
<body>
  <div class="col">
    <label>local woff2</label>
    <p class="local">ADA</p>
  </div>
  <div class="col">
    <label>google cdn</label>
    <p class="gfont">ADA</p>
  </div>
</body>
</html>
